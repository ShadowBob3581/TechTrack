upstream frontend_cluster {
    server frontend_service:80;
}

upstream backend_cluster {
    server backend_service:5000;
}

server {
    listen 80;
    server_name localhost;

    # Compresión Gzip para acelerar la SPA en producción
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 1. Enrutar peticiones a la API del Backend de Flask
    location /api/ {
        proxy_pass http://backend_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Ajustes para subida masiva de archivos grandes bufferizados (Max 15MB)
        client_max_body_size 15M;
    }

    # 2. Enrutar peticiones de vistas y scripts estáticos al Frontend
    location / {
        proxy_pass http://frontend_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}