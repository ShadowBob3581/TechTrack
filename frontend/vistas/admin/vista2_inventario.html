<div class="page-header-block">
    <div>
        <h1 class="page-title">Inventario de Activos</h1>
        <p class="page-sub">Altas, bajas, estados de mantenimiento e historiales de hardware del laboratorio TESCHA.</p>
    </div>
    <button class="btn btn-primary" onclick="abrirModalInventario()">
        <span class="btn-icon">➕</span> Registrar Nuevo Activo
    </button>
</div>

<div class="section inventory-filters-section">
    <div class="filters-layout">
        <div class="search-wrapper field" style="margin-bottom: 0;">
            <input type="text" id="buscar-inventario" placeholder="Buscar por nombre, número de serie o modelo..." oninput="filtrarInventarioLocal()">
        </div>

        <div class="selects-wrapper">
            <div class="field" style="margin-bottom: 0;">
                <select id="filtro-categoria" class="select-clean" onchange="filtrarInventarioLocal()">
                    <option value="todos">📦 Categorías</option>
                    <option value="computo">Cómputo</option>
                    <option value="electronica">Electrónica</option>
                    <option value="medicion">Medición</option>
                    <option value="herramientas">Herramientas</option>
                </select>
            </div>

            <div class="field" style="margin-bottom: 0;">
                <select id="filtro-estado" class="select-clean" onchange="filtrarInventarioLocal()">
                    <option value="todos">🟢 Todos los Estados</option>
                    <option value="disponible">Disponible</option>
                    <option value="prestado">En Préstamo</option>
                    <option value="mantenimiento">Mantenimiento</option>
                    <option value="baja">Dado de Baja</option>
                </select>
            </div>
        </div>
    </div>
</div>

<div id="grid-inventario-activos" class="grid-tarjetas-inventario">
    <div class="no-cards-msg">
        Sincronizando estanterías virtuales de hardware...
    </div>
</div>

<div id="modal-activo" class="modal-overlay" style="display: none;">
    <div class="modal-card animate-fadeIn">
        
        <div class="modal-header">
            <h2 id="modal-activo-titulo" class="modal-title">📦 Registrar Nuevo Activo</h2>
            <button class="btn-close-modal" onclick="cerrarModalInventario()">✕</button>
        </div>

        <form id="form-activo-inventario" onsubmit="guardarActivoInventario(event)">
            <input type="hidden" id="activo-id">

            <div class="modal-body">
                <div class="field">
                    <label class="field-label" for="activo-nombre">Nombre del Activo *</label>
                    <input type="text" id="activo-nombre" class="input-clean" placeholder="Ej. Computadora Dell OptiPlex" required>
                </div>

                <div class="form-row-double">
                    <div class="field">
                        <label class="field-label" for="activo-select-cat">Categoría *</label>
                        <select id="activo-select-cat" class="select-clean-modal" required>
                            <option value="">Selecciona una...</option>
                            <option value="computo">🖥️ Cómputo</option>
                            <option value="electronica">⚡ Electrónica</option>
                            <option value="medicion">🔬 Medición</option>
                            <option value="herramientas">🛠️ Herramientas</option>
                        </select>
                    </div>

                    <div class="field">
                        <label class="field-label" for="activo-marca">Marca *</label>
                        <input type="text" id="activo-marca" class="input-clean" placeholder="Ej. HP, Dell, Steren" required>
                    </div>
                </div>

                <div class="form-row-double">
                    <div class="field">
                        <label class="field-label" for="activo-serie">Número de Serie *</label>
                        <input type="text" id="activo-serie" class="input-clean serial-font" placeholder="Ej. MXL1234XYZ" required>
                    </div>

                    <div class="field">
                        <label class="field-label" for="activo-ubicacion">Ubicación Física *</label>
                        <input type="text" id="activo-ubicacion" class="input-clean" placeholder="Ej. Estante B, Laboratorio 3" required>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-cancel" onclick="cerrarModalInventario()">Cancelar</button>
                <button type="submit" class="btn btn-primary">💾 Guardar Hardware</button>
            </div>
        </form>

    </div>
</div>
